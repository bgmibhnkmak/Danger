name: Run Telegram Bot

on:
  push:
    branches: [ main ]
  workflow_dispatch:
  schedule:
    - cron: '0 */5 * * *' # Har 5 ghante mein auto-restart

jobs:
  run-bot:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      # 🔥 Build tools install karna
      - name: Install build tools
        run: sudo apt update && sudo apt install -y clang upx gcc

      # 🔥 Build binary (Iska naam 'time' hona chahiye kyunki Danger.py yahi mangti hai)
      - name: Build attack binary
        run: |
          gcc -Os bgmi.c -o time -lpthread
          strip time
          upx --best time || true
          chmod +x time

      # 🔥 Setup Python
      - name: Set up Python 3.10
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      # 🔥 Install dependencies (Sirf vahi jo Danger.py ko chahiye)
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install python-telegram-bot pymongo certifi

      # 🔥 Run bot
      - name: Run bot
        run: python Danger.py
